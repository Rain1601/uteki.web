<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 860" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <filter id="s1"><feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#94a3b8" flood-opacity="0.15"/></filter>
    <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.18"/></filter>
    <marker id="av" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,2 L9,5 L0,8Z" fill="#7c3aed"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,2 L9,5 L0,8Z" fill="#94a3b8"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,2 L9,5 L0,8Z" fill="#f59e0b"/>
    </marker>
    <marker id="agr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,2 L9,5 L0,8Z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="860" fill="#f8fafc" rx="14"/>

  <!-- Title -->
  <text x="40" y="42" fill="#1e293b" font-size="17" font-weight="700">Company Agent</text>
  <text x="183" y="42" fill="#94a3b8" font-size="17" font-weight="400"> — 7-Gate Agentic Workflow</text>
  <rect x="720" y="24" width="200" height="26" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="820" y="41" text-anchor="middle" fill="#166534" font-size="10" font-weight="700">✅ Gate 内是真正的 ReAct Agent</text>
  <line x1="40" y1="54" x2="920" y2="54" stroke="#e2e8f0" stroke-width="1.2"/>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- LEFT: Pipeline (G1-G7) -->
  <!-- ══════════════════════════════════════════════════ -->

  <!-- CompanySkillRunner header -->
  <rect x="40" y="66" width="520" height="766" rx="12" fill="#fff" stroke="#ddd6fe" stroke-width="1.5" filter="url(#s2)"/>
  <rect x="40" y="66" width="520" height="34" rx="12" fill="#f5f3ff"/>
  <rect x="40" y="88" width="520" height="12" fill="#f5f3ff"/>
  <text x="64" y="89" fill="#5b21b6" font-size="11" font-weight="700">CompanySkillRunner  ·  PipelineContext</text>
  <text x="64" y="102" fill="#8b5cf6" font-size="9">fetch_company_data → Redis缓存7天 · 跨Gate信息流（G2-6摘要，G7全文）</text>

  <!-- G1 -->
  <rect x="60" y="114" width="340" height="68" rx="9" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.2" filter="url(#s1)"/>
  <rect x="60" y="114" width="5" height="68" rx="3" fill="#8b5cf6"/>
  <text x="76" y="132" fill="#6d28d9" font-size="11" font-weight="800">G1</text>
  <text x="100" y="132" fill="#1e293b" font-size="11" font-weight="600">业务解析</text>
  <text x="76" y="149" fill="#64748b" font-size="9">商业模式 · 盈利逻辑 · 毛利率/FCF/资产轻重</text>
  <text x="76" y="163" fill="#94a3b8" font-size="8.5">可用工具: web_search</text>
  <!-- ReAct badge -->
  <rect x="332" y="122" width="60" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="362" y="133" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">ReAct Loop</text>
  <rect x="332" y="142" width="60" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="362" y="153" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">自主终止</text>

  <line x1="300" y1="182" x2="300" y2="196" stroke="#c4b5fd" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- G2 -->
  <rect x="60" y="198" width="340" height="68" rx="9" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.2" filter="url(#s1)"/>
  <rect x="60" y="198" width="5" height="68" rx="3" fill="#8b5cf6"/>
  <text x="76" y="216" fill="#6d28d9" font-size="11" font-weight="800">G2</text>
  <text x="100" y="216" fill="#1e293b" font-size="11" font-weight="600">成长质量  (Fisher 15问)</text>
  <text x="76" y="233" fill="#64748b" font-size="9">逐题问答 · 0-10分 · 成长类型: compounder/cyclical/turnaround</text>
  <text x="76" y="247" fill="#94a3b8" font-size="8.5">可用工具: web_search · compare_peers</text>
  <rect x="332" y="206" width="60" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="362" y="217" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">ReAct Loop</text>
  <rect x="332" y="226" width="60" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="362" y="237" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">自主终止</text>

  <line x1="300" y1="266" x2="300" y2="280" stroke="#c4b5fd" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- G3 -->
  <rect x="60" y="282" width="340" height="68" rx="9" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.2" filter="url(#s1)"/>
  <rect x="60" y="282" width="5" height="68" rx="3" fill="#8b5cf6"/>
  <text x="76" y="300" fill="#6d28d9" font-size="11" font-weight="800">G3</text>
  <text x="100" y="300" fill="#1e293b" font-size="11" font-weight="600">护城河评估  (Buffett)</text>
  <text x="76" y="317" fill="#64748b" font-size="9">BRAND · NETWORK · SWITCHING · COST · SCALE · IP</text>
  <text x="76" y="331" fill="#94a3b8" font-size="8.5">可用工具: web_search · compare_peers</text>
  <rect x="332" y="290" width="60" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="362" y="301" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">ReAct Loop</text>
  <rect x="332" y="310" width="60" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="362" y="321" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">自主终止</text>

  <!-- Reflection 1 -->
  <rect x="60" y="358" width="480" height="30" rx="7" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.3" stroke-dasharray="6,3"/>
  <text x="300" y="370" text-anchor="middle" fill="#92400e" font-size="9" font-weight="700">⚡ Reflection ①</text>
  <text x="300" y="381" text-anchor="middle" fill="#b45309" font-size="8.5">审计 G1-G3 内在矛盾 → 生成 downstream_hints，注入后续 Gate 的 system prompt</text>
  <!-- reflection left arrow -->
  <path d="M 300,350 L 300,358" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#ao)"/>

  <line x1="300" y1="388" x2="300" y2="402" stroke="#c4b5fd" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- G4 -->
  <rect x="60" y="404" width="340" height="68" rx="9" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.2" filter="url(#s1)"/>
  <rect x="60" y="404" width="5" height="68" rx="3" fill="#8b5cf6"/>
  <text x="76" y="422" fill="#6d28d9" font-size="11" font-weight="800">G4</text>
  <text x="100" y="422" fill="#1e293b" font-size="11" font-weight="600">管理层评估  (Fisher + Munger)</text>
  <text x="76" y="439" fill="#64748b" font-size="9">诚信 · 资本配置 · 薪酬 · 接班风险 · 内部人交易</text>
  <text x="76" y="453" fill="#94a3b8" font-size="8.5">可用工具: web_search</text>
  <rect x="332" y="412" width="60" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="362" y="423" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">ReAct Loop</text>
  <rect x="332" y="432" width="60" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="362" y="443" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">自主终止</text>

  <line x1="300" y1="472" x2="300" y2="486" stroke="#c4b5fd" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- G5 -->
  <rect x="60" y="488" width="340" height="68" rx="9" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.2" filter="url(#s1)"/>
  <rect x="60" y="488" width="5" height="68" rx="3" fill="#8b5cf6"/>
  <text x="76" y="506" fill="#6d28d9" font-size="11" font-weight="800">G5</text>
  <text x="100" y="506" fill="#1e293b" font-size="11" font-weight="600">逆向检验  (Munger)</text>
  <text x="76" y="523" fill="#64748b" font-size="9">毁灭场景(概率×影响) · 红旗清单 · 韧性评分</text>
  <text x="76" y="537" fill="#94a3b8" font-size="8.5">可用工具: web_search · compare_peers</text>
  <rect x="332" y="496" width="60" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="362" y="507" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">ReAct Loop</text>
  <rect x="332" y="516" width="60" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="362" y="527" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">自主终止</text>

  <!-- Reflection 2 -->
  <rect x="60" y="564" width="480" height="30" rx="7" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.3" stroke-dasharray="6,3"/>
  <text x="300" y="576" text-anchor="middle" fill="#92400e" font-size="9" font-weight="700">⚡ Reflection ②</text>
  <text x="300" y="587" text-anchor="middle" fill="#b45309" font-size="8.5">G5 风险 vs G1-G4 正面结论矛盾检查 → downstream_hints</text>
  <path d="M 300,556 L 300,564" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#ao)"/>

  <line x1="300" y1="594" x2="300" y2="608" stroke="#c4b5fd" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- G6 -->
  <rect x="60" y="610" width="340" height="68" rx="9" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.2" filter="url(#s1)"/>
  <rect x="60" y="610" width="5" height="68" rx="3" fill="#8b5cf6"/>
  <text x="76" y="628" fill="#6d28d9" font-size="11" font-weight="800">G6</text>
  <text x="100" y="628" fill="#1e293b" font-size="11" font-weight="600">估值与时机  (Buffett)</text>
  <text x="76" y="645" fill="#64748b" font-size="9">PE/PB/FCF · 同行估值对比 · 安全边际 · 市场温度</text>
  <text x="76" y="659" fill="#94a3b8" font-size="8.5">可用工具: web_search · compare_peers</text>
  <rect x="332" y="618" width="60" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="362" y="629" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">ReAct Loop</text>
  <rect x="332" y="638" width="60" height="16" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="362" y="649" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">自主终止</text>

  <line x1="300" y1="678" x2="300" y2="694" stroke="#c4b5fd" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- G7 -->
  <rect x="60" y="696" width="480" height="60" rx="9" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#s1)"/>
  <rect x="60" y="696" width="5" height="60" rx="3" fill="#6d28d9"/>
  <text x="76" y="716" fill="#4c1d95" font-size="11" font-weight="800">G7</text>
  <text x="100" y="716" fill="#1e293b" font-size="11" font-weight="700">综合裁决  — 读取 G1-G6 全部原始文本</text>
  <text x="76" y="733" fill="#7c3aed" font-size="9">输出完整结构化 JSON：BUY / WATCH / AVOID · conviction · position_size_pct</text>
  <text x="76" y="747" fill="#94a3b8" font-size="8.5">无工具调用 · 无 ReAct  ·  JSON 解析失败 → _structurize_prompt 二次兜底</text>

  <!-- Output -->
  <line x1="300" y1="756" x2="300" y2="772" stroke="#6d28d9" stroke-width="1.5" marker-end="url(#av)"/>
  <rect x="60" y="774" width="480" height="36" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.2"/>
  <text x="300" y="789" text-anchor="middle" fill="#4c1d95" font-size="10" font-weight="700">output_parser → Pydantic Schema → PostgreSQL</text>
  <text x="300" y="803" text-anchor="middle" fill="#7c3aed" font-size="8.5">CompanyFullReport · BusinessAnalysisOutput · FisherQAOutput · MoatAssessmentOutput ...</text>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- RIGHT: ReAct Engine (GateExecutor detail) -->
  <!-- ══════════════════════════════════════════════════ -->
  <rect x="590" y="66" width="330" height="694" rx="12" fill="#fff" stroke="#d1fae5" stroke-width="1.5" filter="url(#s2)"/>
  <rect x="590" y="66" width="330" height="34" rx="12" fill="#f0fdf4"/>
  <rect x="590" y="88" width="330" height="12" fill="#f0fdf4"/>
  <text x="614" y="89" fill="#166534" font-size="11" font-weight="700">GateExecutor — ReAct 引擎</text>
  <text x="614" y="102" fill="#16a34a" font-size="9">Gate 1-6 共用，每 Gate 独立 ToolBudget</text>

  <!-- ReAct loop diagram -->
  <!-- Input -->
  <rect x="614" y="116" width="282" height="36" rx="7" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="755" y="130" text-anchor="middle" fill="#166534" font-size="9.5" font-weight="600">系统提示词构建</text>
  <text x="755" y="143" text-anchor="middle" fill="#4ade80" font-size="8.5">skill.system_prompt + 公司财务数据 + 前序 Gate 摘要</text>

  <line x1="755" y1="152" x2="755" y2="166" stroke="#10b981" stroke-width="1.2" marker-end="url(#agr)"/>

  <!-- Think box -->
  <rect x="670" y="168" width="170" height="52" rx="9" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1.5" filter="url(#s1)"/>
  <text x="755" y="188" text-anchor="middle" fill="#065f46" font-size="10.5" font-weight="700">Think</text>
  <text x="755" y="203" text-anchor="middle" fill="#047857" font-size="8.5">LLM 推理，决定</text>
  <text x="755" y="214" text-anchor="middle" fill="#047857" font-size="8.5">是否调用工具</text>

  <!-- Decision diamond -->
  <polygon points="755,234 795,258 755,282 715,258" fill="#fff" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="755" y="255" text-anchor="middle" fill="#065f46" font-size="9" font-weight="700">tool?</text>
  <text x="755" y="266" text-anchor="middle" fill="#94a3b8" font-size="8">conclude?</text>

  <!-- Yes tool → Act -->
  <line x1="795" y1="258" x2="860" y2="258" stroke="#10b981" stroke-width="1.2"/>
  <text x="826" y="252" text-anchor="middle" fill="#10b981" font-size="8.5">yes</text>
  <line x1="860" y1="258" x2="860" y2="308" stroke="#10b981" stroke-width="1.2" marker-end="url(#agr)"/>

  <!-- Act box -->
  <rect x="818" y="310" width="124" height="52" rx="9" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1.5" filter="url(#s1)"/>
  <text x="880" y="330" text-anchor="middle" fill="#065f46" font-size="10" font-weight="700">Act</text>
  <text x="880" y="346" text-anchor="middle" fill="#047857" font-size="8">ToolExecutor.execute()</text>
  <text x="880" y="357" text-anchor="middle" fill="#047857" font-size="8">web_search / compare_peers</text>

  <!-- budget check -->
  <rect x="818" y="372" width="124" height="28" rx="6" fill="#fef3c7" stroke="#fde68a" stroke-width="0.8"/>
  <text x="880" y="383" text-anchor="middle" fill="#92400e" font-size="8" font-weight="600">ToolBudget 检查</text>
  <text x="880" y="394" text-anchor="middle" fill="#b45309" font-size="7.5">搜索≤6 · 轮次≤5 · 时间≤180s</text>

  <!-- Observe box -->
  <rect x="818" y="410" width="124" height="44" rx="9" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1.5" filter="url(#s1)"/>
  <text x="880" y="428" text-anchor="middle" fill="#065f46" font-size="10" font-weight="700">Observe</text>
  <text x="880" y="443" text-anchor="middle" fill="#047857" font-size="8">追加工具结果</text>
  <text x="880" y="453" text-anchor="middle" fill="#047857" font-size="8">到消息列表</text>

  <!-- loop back arrow -->
  <path d="M880,454 L880,480 L630,480 L630,185 L670,185" fill="none" stroke="#10b981" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#agr)"/>
  <text x="636" y="340" fill="#10b981" font-size="8.5" transform="rotate(-90,636,340)">loop back</text>

  <!-- conclude path -->
  <line x1="755" y1="282" x2="755" y2="310" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="762" y="300" fill="#7c3aed" font-size="8.5">conclude</text>
  <line x1="755" y1="310" x2="755" y2="326" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#av)"/>

  <!-- conclude box -->
  <rect x="673" y="328" width="164" height="52" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="755" y="347" text-anchor="middle" fill="#5b21b6" font-size="9.5" font-weight="700">&lt;conclude&gt; 解析</text>
  <text x="755" y="361" text-anchor="middle" fill="#7c3aed" font-size="8.5">core_conclusion</text>
  <text x="755" y="373" text-anchor="middle" fill="#7c3aed" font-size="8.5">key_findings · confidence</text>

  <line x1="755" y1="380" x2="755" y2="396" stroke="#7c3aed" stroke-width="1.2" marker-end="url(#av)"/>

  <!-- GateResult -->
  <rect x="673" y="398" width="164" height="44" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.2"/>
  <text x="755" y="416" text-anchor="middle" fill="#5b21b6" font-size="9" font-weight="600">GateResult</text>
  <text x="755" y="429" text-anchor="middle" fill="#7c3aed" font-size="8">raw · summary · latency_ms</text>
  <text x="755" y="440" text-anchor="middle" fill="#7c3aed" font-size="8">actions[] · parse_status</text>

  <!-- no-tool path -->
  <line x1="715" y1="258" x2="614" y2="258" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="662" y="252" text-anchor="middle" fill="#94a3b8" font-size="8">no tool</text>
  <line x1="614" y1="258" x2="614" y2="348" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="608" y="308" fill="#94a3b8" font-size="8" transform="rotate(-90,608,308)">隐式结束</text>
  <line x1="614" y1="348" x2="673" y2="348" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#ag)"/>

  <!-- ToolCallParser note -->
  <rect x="614" y="458" width="282" height="52" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="755" y="474" text-anchor="middle" fill="#9a3412" font-size="9.5" font-weight="700">ToolCallParser  — 4种格式兼容</text>
  <text x="755" y="488" text-anchor="middle" fill="#c2410c" font-size="8.5">&lt;tool_call&gt;{JSON}&lt;/tool_call&gt;  ·  XML元素  ·  代码块</text>
  <text x="755" y="500" text-anchor="middle" fill="#c2410c" font-size="8.5">JSON wrapper  ·  &lt;conclude&gt; 终止检测</text>

  <!-- SSE Events from GateExecutor -->
  <rect x="614" y="522" width="282" height="64" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="755" y="538" text-anchor="middle" fill="#0369a1" font-size="9.5" font-weight="600">SSE 事件流（每 Gate）</text>
  <rect x="624" y="546" width="72" height="16" rx="4" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="0.8"/>
  <text x="660" y="557" text-anchor="middle" fill="#0369a1" font-size="8">gate_text</text>
  <rect x="702" y="546" width="72" height="16" rx="4" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="0.8"/>
  <text x="738" y="557" text-anchor="middle" fill="#0369a1" font-size="8">tool_call</text>
  <rect x="780" y="546" width="106" height="16" rx="4" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="0.8"/>
  <text x="833" y="557" text-anchor="middle" fill="#0369a1" font-size="8">gate_complete</text>
